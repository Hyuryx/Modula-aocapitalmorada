<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Painel de Avisos</title>

  <link rel="icon" type="image/png" href="/assets/iconesite/icone.png?v=2">
  <link rel="stylesheet" href="./painel.css">
</head>

<body>
  <main class="painel">
    <header class="cabecalho">
      <div style="display: flex; align-items: center; gap: 20px;">
        <img src="/assets/iconesite/icone.png" alt="Logo Bombeiros" style="width: 80px; height: 80px; object-fit: contain;">
        <div>
          <span class="etiqueta">Painel local</span>
          <h1 style="margin-top: 5px;">Gerenciador de avisos</h1>
          <p style="margin-top: 5px;">
            Crie, edite e exclua os avisos que serão publicados no site.
          </p>
        </div>
      </div>

      <div id="statusServidor" class="status">
        Carregando avisos...
      </div>
    </header>

    <section class="card">
      <h2 id="tituloFormulario">Novo aviso</h2>

      <form id="formularioAviso">
        <input type="hidden" id="avisoId">

        <div class="campo campo-completo">
          <label for="titulo">Título</label>

          <input
            type="text"
            id="titulo"
            list="opcoes-curso"
            maxlength="100"
            required
            placeholder="Selecione um curso ou digite um título"
          >
          <datalist id="opcoes-curso">
            <option value="Curso de Piloto"></option>
            <option value="Resgate Aquático"></option>
            <option value="Resgate Montanha"></option>
            <option value="Paraquedismo"></option>
          </datalist>
        </div>

        <div class="campo campo-completo">
          <label for="descricao">Descrição</label>

          <textarea
            id="descricao"
            maxlength="500"
            required
            placeholder="Digite as informações do aviso"
          ></textarea>
        </div>

        <div class="campo">
          <label for="categoria">Categoria</label>

          <select id="categoria" required>
            <option value="curso">Curso</option>
            <option value="informacao">Informação</option>
            <option value="comunicado">Comunicado</option>
            <option value="evento">Evento</option>
            <option value="manutencao">Manutenção</option>
          </select>
        </div>

        <div class="campo">
          <label for="prioridade">Prioridade</label>

          <select id="prioridade" required>
            <option value="normal">Normal</option>
            <option value="importante">Importante</option>
            <option value="urgente">Urgente</option>
          </select>
        </div>

        <div class="campo">
          <label for="inicio">Início</label>

          <input
            type="datetime-local"
            id="inicio"
            required
          >
        </div>

        <div class="campo" id="grupoEncerramento">
          <label for="fim">Encerramento</label>

          <input
            type="datetime-local"
            id="fim"
            required
          >
          <style>
            #semFim {
              width: auto !important;
              height: auto !important;
              padding: 0 !important;
              margin: 0 !important;
              border: none !important;
              background: transparent !important;
              box-shadow: none !important;
            }
          </style>
          <div style="margin-top: 8px; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; gap: 8px;">
            <input type="checkbox" id="semFim">
            <label for="semFim" style="margin: 0; font-size: 0.9rem; font-weight: normal; cursor: pointer;">
              Sem limite de tempo
            </label>
          </div>
        </div>

        <div class="campo campo-completo">
          <label for="link">Link do aviso</label>

          <input
            type="text"
            id="link"
            placeholder="/cursos.html ou #curso-resgate"
          >
        </div>

        <fieldset class="campo-completo opcoes">
          <legend>Onde exibir</legend>

          <label>
            <input
              type="checkbox"
              id="mostrarPopup"
              checked
            >
            Mostrar como pop-up
          </label>

          <label>
            <input
              type="checkbox"
              id="mostrarAvisosGerais"
              checked
            >
            Mostrar em Avisos Gerais
          </label>

          <label>
            <input
              type="checkbox"
              id="piscar"
            >
            Aplicar animação de destaque
          </label>

          <label>
            <input
              type="checkbox"
              id="ativo"
              checked
            >
            Aviso ativo
          </label>
        </fieldset>

        <div class="acoes campo-completo">
          <button type="submit" class="botao primario">
            Salvar aviso
          </button>

          <button
            type="button"
            id="cancelarEdicao"
            class="botao secundario"
            hidden
          >
            Cancelar edição
          </button>
        </div>
      </form>
    </section>

    <section class="card">
      <div class="titulo-lista">
        <div>
          <h2>Avisos cadastrados</h2>
          <p id="quantidadeAvisos">Nenhum aviso</p>
        </div>

        <button
          type="button"
          id="salvarArquivo"
          class="botao primario"
        >
          Salvar avisos.json
        </button>
      </div>

      <div id="listaAvisos" class="lista-avisos"></div>
    </section>
  </main>

  <script src="./painel.js"></script>
</body>
</html>
